  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #fafaf9;
      --text: #27272a;
      --muted: #71717a;
      --border: #e4e4e7;
      --link: #18181b;
      --link-hover: #3f3f46;
      --card-bg: #fff;
      --card-hover: #f4f4f5;
    }

    html.dark {
      --bg: #09090b;
      --text: #fafafa;
      --muted: #a1a1aa;
      --border: #27272a;
      --link: #e4e4e7;
      --link-hover: #a1a1aa;
      --card-bg: #18181b;
      --card-hover: #27272a;
    }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 64px 24px 80px;
      transition: background-color 0.2s, color 0.2s;
    }

    /* Theme toggle */
    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 52px;
      height: 28px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      cursor: pointer;
      padding: 0;
      z-index: 100;
      transition: background 0.25s, border-color 0.25s;
    }

    .theme-toggle:hover {
      border-color: #a1a1aa;
    }

    .toggle-knob {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: left 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    html.dark .toggle-knob {
      left: 27px;
    }

    .toggle-knob svg {
      width: 11px;
      height: 11px;
      color: var(--card-bg);
      flex-shrink: 0;
    }

    .icon-sun { display: none; }
    .icon-moon { display: block; }
    html.dark .icon-sun { display: block; }
    html.dark .icon-moon { display: none; }

    /* Header area */
    .header-area {
      width: 100%;
      max-width: 560px;
    }

    /* Back link */
    .back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.875rem;
      margin-bottom: 32px;
      transition: color 0.15s;
    }

    .back:hover {
      color: var(--text);
    }

    .back svg {
      width: 14px;
      height: 14px;
    }

    /* Header */
    .header {
      margin-bottom: 32px;
    }

    .page-title {
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 6px;
    }

    .page-sub {
      font-size: 0.9375rem;
      color: var(--muted);
    }

    /* Divider */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin-bottom: 32px;
    }

    /* Embed — full width */
    .embed-wrapper {
      width: 100%;
      max-width: 1200px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .embed-wrapper iframe {
      display: block;
      width: 100%;
      height: calc(100vh - 260px);
      min-height: 500px;
      border: 0;
    }

    /* Footer */
    .footer {
      margin-top: 48px;
      font-size: 0.8125rem;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <button class="theme-toggle" id="themeToggle" aria-label="Tema değiştir">
    <span class="toggle-knob">
      <svg class="icon-moon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
      </svg>
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="4"/>
        <line x1="12" y1="2" x2="12" y2="4"/>
        <line x1="12" y1="20" x2="12" y2="22"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="2" y1="12" x2="4" y2="12"/>
        <line x1="20" y1="12" x2="22" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </span>
  </button>

  <div class="header-area">
    <a class="back" href="/">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Ana sayfa
    </a>

    <header class="header">
      <h1 class="page-title">Yer İmleri</h1>
      <p class="page-sub">Kaydettiğim kaynaklar ve bağlantılar</p>
    </header>

    <hr class="divider" />
  </div>

  <div class="embed-wrapper">
    <iframe allowfullscreen frameborder="0" src="https://ubeyd.raindrop.page/embed/me"></iframe>
  </div>

  <footer class="footer">
    <p>İstanbul, Türkiye</p>
  </footer>

  <script>
    const html = document.documentElement;
    const btn = document.getElementById('themeToggle');
    const mq = window.matchMedia('(prefers-color-scheme: dark)');

    function applyTheme(isDark) {
      html.classList.toggle('dark', isDark);
    }

    const stored = localStorage.getItem('theme');
    applyTheme(stored ? stored === 'dark' : mq.matches);

    mq.addEventListener('change', (e) => {
      localStorage.removeItem('theme');
      applyTheme(e.matches);
    });

    btn.addEventListener('click', () => {
      const isDark = !html.classList.contains('dark');
      applyTheme(isDark);
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });
  </script>
</body>
</html>
